<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Reiteradas ENEL</title>

  <link rel="icon" type="image/png" sizes="32x32" href="assets/logo-enel-preview.png?v=2" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body class="login-body">
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <img src="assets/enel1.png" alt="ENEL Brasil" class="header-logo" />
        <div class="header-text">
          <h1 class="header-title">Reiteradas - ENEL</h1>
          <p class="header-subtitle">Acesso ao Sistema</p>
        </div>
      </div>

      <div class="header-actions">
        <a class="btn btn-secondary btn-sm" href="index.html">
          <i class="fas fa-home"></i> Página Inicial
        </a>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container login-container">
      <section class="card login-card">
        <div class="login-card-head">
          <h2 class="section-title" style="margin:0;">
            <i class="fas fa-key"></i> Login
          </h2>
          <p class="login-muted">Escolha um perfil e entre com suas credenciais.</p>
        </div>

        <div class="role-picker">
          <button type="button" class="role-btn active" data-role="INSPETOR">
            <i class="fa-solid fa-user-gear"></i>
            <span>
              <b>Inspetor</b><br/>
              <small>painel de resposta</small>
            </span>
          </button>

          <button type="button" class="role-btn" data-role="ADMIN">
            <i class="fa-solid fa-user-shield"></i>
            <span>
              <b>Admin</b><br/>
              <small>uploads e auditoria</small>
            </span>
          </button>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input id="email" type="email" class="form-input" autocomplete="username" required />
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input id="senha" type="password" class="form-input" autocomplete="current-password" required />
          </div>

          <button id="btnLogin" type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-sign-in-alt"></i> Entrar
          </button>

          <div id="loginError" class="error-message"></div>
        </form>

        <div class="login-footer">
          <span class="login-muted">
            Dica: se você já estiver logado, você será redirecionado automaticamente.
          </span>
        </div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast">
    <span id="toastMessage"></span>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
