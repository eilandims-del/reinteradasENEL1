<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel do Inspetor - Reiteradas</title>

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/inspetor.css" /> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
<header class="header">
  <div class="container">
    <div class="header-content">
      <h1 class="logo">Painel do Inspetor</h1>
      <nav class="header-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Página Inicial</a>
        <button id="logoutInspetorBtn" class="nav-link btn-logout" style="display:none;">
          <i class="fas fa-sign-out-alt"></i> Sair
        </button>
      </nav>
    </div>
  </div>
</header>

<main class="main-content">
  <div class="container">

    <!-- Login Inspetor -->
    <section id="loginInspetorSection" class="login-section card">
      <h2 class="section-title"><i class="fas fa-id-badge"></i> Acesso Inspetor</h2>

      <form id="loginInspetorForm" class="login-form">
        <div class="form-group">
          <label for="inspEmail">E-mail:</label>
          <input type="email" id="inspEmail" class="form-input" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="inspSenha">Senha:</label>
          <input type="password" id="inspSenha" class="form-input" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-sign-in-alt"></i> Entrar
        </button>

        <div id="inspLoginError" class="error-message"></div>
      </form>
    </section>

    <!-- Painel Inspetor -->
    <section id="inspetorSection" class="admin-section" style="display:none;">
      <section class="card">

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;">
          <h2 class="section-title" style="margin:0;"><i class="fas fa-list-check"></i> Reiteradas para Retorno</h2>
          <button id="btnReloadInspetor" class="btn btn-secondary btn-sm">
            <i class="fas fa-rotate"></i> Atualizar
          </button>
        </div>

        <!-- filtros (AO/DN/DO) -->
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">
          <button id="btnAO" class="btn btn-outline btn-sm">AO</button>
          <button id="btnDN" class="btn btn-outline btn-sm">DN</button>
          <button id="btnDO" class="btn btn-outline btn-sm">DO</button>
          <button id="btnTODOS" class="btn btn-outline btn-sm">TODOS</button>
        </div>

        <!-- filtros de elemento -->
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
          <button id="btnTipoTrafo" class="btn btn-outline btn-sm">Trafo (T)</button>
          <button id="btnTipoFusivel" class="btn btn-outline btn-sm">Fusível (F)</button>
          <button id="btnTipoReligador" class="btn btn-outline btn-sm">Religador (outros)</button>
          <button id="btnTipoTodos" class="btn btn-outline btn-sm">Todos</button>
        </div>

        <!-- período -->
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:end;">
          <div class="form-group" style="margin:0;">
            <label for="inspDataInicial">Data início</label>
            <input type="date" id="inspDataInicial" class="form-input" />
          </div>
          <div class="form-group" style="margin:0;">
            <label for="inspDataFinal">Data fim</label>
            <input type="date" id="inspDataFinal" class="form-input" />
          </div>
          <button id="btnAplicarInsp" class="btn btn-primary btn-sm">
            <i class="fas fa-filter"></i> Aplicar
          </button>
        </div>

        <!-- busca -->
        <div class="form-group" style="margin-top:12px;">
          <label for="inspBusca">Buscar (elemento / incidência / cliente)</label>
          <input id="inspBusca" class="form-input" placeholder="Digite para filtrar..." />
        </div>

        <div id="inspResumo" style="margin-top:10px;color:var(--medium-gray);"></div>

        <!-- lista -->
        <div id="inspLista" style="margin-top:12px;"></div>

      </section>
    </section>

  </div>
</main>

<!-- Modal Retorno -->
<div id="modalRetornoInspetor" class="modal">
  <div class="modal-content" style="max-width:720px;">
    <button class="modal-close" type="button">&times;</button>

    <h2 id="retornoTitulo" style="margin-top:0;">Retorno</h2>

    <div id="retornoMeta" style="font-size:0.95rem;color:var(--medium-gray);margin-bottom:10px;"></div>

    <div class="form-group">
      <label for="retornoTexto">Retorno</label>
      <textarea id="retornoTexto" class="form-input" rows="5" placeholder="Digite o retorno..."></textarea>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button id="btnLimparRetorno" class="btn btn-secondary">
        <i class="fas fa-eraser"></i> Limpar
      </button>
      <button id="btnEnviarRetorno" class="btn btn-primary">
        <i class="fas fa-paper-plane"></i> Enviar
      </button>
    </div>
  </div>
</div>

<div id="toast" class="toast">
  <span id="toastMessage"></span>
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/services/firebase-service.js"></script>
<script type="module" src="js/utils/helpers.js"></script>
<script type="module" src="js/components/modal.js"></script>
<script type="module" src="js/inspetor.js"></script>

</body>
</html>
